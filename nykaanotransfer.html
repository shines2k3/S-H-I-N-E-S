<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nykaa Matte to Last No Transfer Long Lasting Lipstick</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.product{
max-width:1100px;
margin:auto;
background:#fff;
padding:30px;
border-radius:12px;
display:flex;
gap:40px;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.product img{
width:100%;
max-width:380px;
border-radius:10px;
display:block;
margin:auto;
}

.details{
flex:1;
}

h1{
font-size:32px;
margin-bottom:20px;
}

.price{
margin:15px 0;
font-size:20px;
}

.price del{
color:#888;
margin-right:10px;
}

.price span{
color:#e91e63;
font-size:30px;
font-weight:bold;
}

select{
width:100%;
max-width:320px;
padding:12px;
font-size:16px;
margin-top:10px;
border-radius:6px;
}

.btn{
display:inline-block;
margin-top:25px;
padding:14px 28px;
background:#25D366;
color:#fff;
text-decoration:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
}

@media(max-width:768px){

.product{
flex-direction:column;
padding:20px;
}

.product img{
max-width:280px;
}

h1{
font-size:24px;
text-align:center;
}

.price,
p{
text-align:center;
}

select{
max-width:100%;
}

.btn{
display:block;
width:100%;
text-align:center;
}

}

</style>

</head>

<body>

<div class="product">

<img id="productImage"
src="nykaalipstick1/On Fire.jpeg"
alt="Nykaa Lipstick">

<div class="details">

<h1>Nykaa Matte to Last No Transfer Long Lasting Lipstick</h1>

<p class="price">
<del>₹599</del>
<span>₹470</span>
</p>

<p>
Selected Shade :
<b id="shadeName">Mum Taj</b>
</p>

<br>

<select id="shade">

<option>Mum Taj</option>
<option>Chai</option>
<option>Maharani</option>
<option>Boho</option>
<option>Bombae</option>
<option>Kashi</option>
<option>Madras Kaapi</option>
<option>Maithili</option>
<option>Jhumki</option>
<option>Mishti</option>

</select>

<br>

<a id="orderBtn" class="btn" href="#">
Order on WhatsApp
</a>

</div>

</div>
<script>
const shade=document.getElementById("shade");
const img=document.getElementById("productImage");
const nameEl=document.getElementById("shadeName");
const btn=document.getElementById("orderBtn");

const shadeImages={

    "Mum Taj":"nykaalipstick1/Mum Taj.jpeg",
    "Chai":"nykaalipstick1/Chai.jpeg",
    "Maharani":"nykaalipstick1/Maharani.jpeg",
    "Boho":"nykaalipstick1/Boho.jpeg",
    "Bombae":"nykaalipstick1/Bombae.jpeg",
    "Kashi":"nykaalipstick1/Kashi.jpeg",
    "Madras Kaapi":"nykaalipstick1/Madras Kaapi.jpeg",
    "Maithili":"nykaalipstick1/Maithili.jpeg",
    "Jhumki":"nykaalipstick1/Jhumki.jpeg",
    "Mishti":"nykaalipstick1/Mishti.jpeg",

};

function update(){

const s=shade.value;

img.src=shadeImages[s];
nameEl.textContent=s;

btn.innerHTML="Order on WhatsApp";
btn.style.background="#25D366";
btn.style.pointerEvents="auto";

btn.href="https://wa.me/919526112374?text="+encodeURIComponent(
"Hi, I want to order Nykaa Matte to Last No Transfer Long Lasting Lipstick\nShade : "+s
);

}

shade.addEventListener("change",update);

update();

</script>

</body>
</html>
