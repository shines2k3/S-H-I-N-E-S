<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MARS Matte Box Set of 3 Lipstick</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.product{
max-width:1100px;
margin:auto;
background:#fff;
padding:30px;
border-radius:12px;
display:flex;
gap:40px;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.product img{
width:100%;
max-width:380px;
border-radius:10px;
display:block;
margin:auto;
}

.details{
flex:1;
}

h1{
font-size:32px;
margin-bottom:20px;
}

.price{
margin:15px 0;
font-size:20px;
}

.price del{
color:#888;
margin-right:10px;
}

.price span{
color:#e91e63;
font-size:30px;
font-weight:bold;
}

select{
width:100%;
max-width:320px;
padding:12px;
font-size:16px;
margin-top:10px;
border-radius:6px;
}

.btn{
display:inline-block;
margin-top:25px;
padding:14px 28px;
background:#25D366;
color:#fff;
text-decoration:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
}

@media(max-width:768px){

.product{
flex-direction:column;
padding:20px;
}

.product img{
max-width:280px;
}

h1{
font-size:24px;
text-align:center;
}

.price,
p{
text-align:center;
}

select{
max-width:100%;
}

.btn{
display:block;
width:100%;
text-align:center;
}

}

</style>

</head>

<body>

<div class="product">

<img id="productImage" 
src="marslipstick/marsbox.jpeg"
alt="marslipstick">

<div class="details">

<h1>MARS Matte Box Set of 3 Lipstick</h1>

<p class="price">
<del>₹447</del> 
<span>₹340</span>

</p>
Selected Shade: 
<b id="shadeName">Red & Maroon</b>
</p>

<br>

<select id="shade">

<option>01-Red & Maroon</option>
<option>02-Peaches & Nudes</option>
<option>3x 04-Brown</option>
<option>03-plum</option>
<option>06 All Rounder</option>

</select>
<br>
<a id="orderBtn" class="btn" href="#">
Order on WhatsApp
</a>

</div>

</div>
<script>
const shade = document.getElementById("shade");
const img = document.getElementById("productImage");
const nameEl = document.getElementById("shadeName");
const btn = document.getElementById("orderBtn");

const shadeImages = {

    "01-Red & Maroon":"marslipstick/01-Red & Maroon.jpeg",
    "02-Peaches & Nudes":"marslipstick/02-Peaches & Nudes.jpeg",
    "3x 04-Brown":"marslipstick/3x 04-Brown.jpeg",
    "03-plum":"marslipstick/03-plum.jpeg",
    "06 All Rounder":"marslipstick/06 All Rounder.jpeg",
};

function update(){

    const s = shade.value;
    
    img.src=shadeImages[s];
    nameEl.textContent=s;

    btn.innerHTML="Order on WhatsApp";
    btn.style.background="#25D366";
    btn.style.pointerEvents="auto";

    btn.href ="https://wa.me/919526112374?text=" +encodeURIComponent(
    "Hi, I want to order MARS Matte Box Set of 3 Lipstick\nShade: " + s
    );
}

shade.addEventListener("change",update);

update();

</script>

</body>
</html>
